name: Backend Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

env:
  BACKEND_CONTEXT: ./services/backend
  IMAGE_NAME: launchdate-backend
  REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  publish-backend-image:
    name: Publish backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image reference
        id: prep
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.title=launchdate-backend
            org.opencontainers.image.description=Launchdate backend service
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_CONTEXT }}
          file: ${{ env.BACKEND_CONTEXT }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  populate-release-notes:
    name: Populate release notes
    runs-on: ubuntu-latest

    steps:
      - name: Fill empty release body with generated notes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const release = context.payload.release;
            const currentBody = release.body ? release.body.trim() : '';

            if (currentBody) {
              core.info('Release body already contains content. Skipping update.');
              return;
            }

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: release.tag_name,
              target_commitish: release.target_commitish || context.sha,
            });

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: generated.data.body,
            });

            core.info(`Updated release ${release.tag_name} with GitHub-generated notes.`);
